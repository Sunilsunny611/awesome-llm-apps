<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Event Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'party': '#8B5CF6',
                        'other': '#EF4444'
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { min-height: 400px; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <h1 class="text-2xl font-bold text-gray-900">🌍 Event Discovery</h1>
                    </div>
                    <div class="ml-4 text-sm text-gray-600">
                        What's happening around you, right now
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-gray-600">
                        User ID: <span id="userId" class="font-mono text-purple-600">Loading...</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-3 h-3 bg-party rounded-full"></div>
                        <span class="text-sm text-gray-600">Party</span>
                        <div class="w-3 h-3 bg-other rounded-full ml-3"></div>
                        <span class="text-sm text-gray-600">Other</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Map Section -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="p-4 border-b bg-gray-50">
                        <h2 class="text-lg font-semibold text-gray-900">Live Event Map</h2>
                        <p class="text-sm text-gray-600 mt-1">Click on the map to add an event at that location</p>
                    </div>
                    <div id="map" class="w-full h-96"></div>
                </div>

                <!-- Event Creation Form -->
                <div class="mt-6 bg-white rounded-lg shadow-md p-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Add New Event</h3>
                    <form id="eventForm" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="eventName" class="block text-sm font-medium text-gray-700 mb-1">Event Name</label>
                                <input type="text" id="eventName" name="eventName" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                    placeholder="What's happening?">
                            </div>
                            <div>
                                <label for="eventType" class="block text-sm font-medium text-gray-700 mb-1">Event Type</label>
                                <select id="eventType" name="eventType" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                                    <option value="">Select type...</option>
                                    <option value="Party">Party</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="startTime" class="block text-sm font-medium text-gray-700 mb-1">Start Time</label>
                                <input type="datetime-local" id="startTime" name="startTime" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                            </div>
                            <div>
                                <label for="endTime" class="block text-sm font-medium text-gray-700 mb-1">End Time</label>
                                <input type="datetime-local" id="endTime" name="endTime" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="latitude" class="block text-sm font-medium text-gray-700 mb-1">Latitude</label>
                                <input type="number" id="latitude" name="latitude" step="any" readonly
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50 text-gray-600"
                                    placeholder="Click on map to set location">
                            </div>
                            <div>
                                <label for="longitude" class="block text-sm font-medium text-gray-700 mb-1">Longitude</label>
                                <input type="number" id="longitude" name="longitude" step="any" readonly
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50 text-gray-600"
                                    placeholder="Click on map to set location">
                            </div>
                        </div>

                        <button type="submit" id="submitBtn"
                            class="w-full bg-purple-600 text-white py-2 px-4 rounded-md hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                            Create Event
                        </button>
                    </form>
                </div>
            </div>

            <!-- Events List -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow-md">
                    <div class="p-4 border-b bg-gray-50">
                        <h3 class="text-lg font-semibold text-gray-900">Live Events</h3>
                        <p class="text-sm text-gray-600 mt-1">Events happening right now</p>
                    </div>
                    <div id="eventsList" class="max-h-96 overflow-y-auto">
                        <div class="p-4 text-center text-gray-500">
                            <div class="animate-pulse">
                                <div class="w-8 h-8 bg-gray-200 rounded-full mx-auto mb-2"></div>
                                <p>Loading events...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Status Messages -->
                <div id="messageContainer" class="mt-4 space-y-2">
                    <!-- Messages will be dynamically inserted here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        // Make Firebase available globally
        window.firebaseModules = {
            initializeApp,
            getFirestore,
            getAuth
        };
    </script>
    
    <!-- Configuration -->
    <script src="config.js"></script>
    
    <!-- Google Maps API -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap"></script>
    
    <!-- App JavaScript -->
    <script src="app.js"></script>
</body>
</html>
